# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@8575951200e472d5f2d95c625da0c7bec8217c42 # v1.161.0
        with:
          ruby-version: '3.1' # Not needed with a .ruby-version file
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 0 # Increment this number if you need to re-download cached gems
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4
      - name: Build with Jekyll
        # Outputs to the './_site' directory by default
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        # Automatically uploads an artifact from the './_site' directory by default
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Notify search engines of updated content
  indexnow:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Ping IndexNow with changed URLs
        run: |
          KEY="6ff2b87724ac930114bf05c74db50bb5"
          HOST="tw93.fun"

          URLS=$(git diff --name-only HEAD~1 HEAD -- '_posts/*.md' '_posts_en/*.md' '*.html' 'projects/*.md' | while read f; do
            case "$f" in
              _posts/*.md)
                slug=$(basename "$f" .md)
                echo "https://$HOST/$(echo $slug | sed 's/^\([0-9]*-[0-9]*-[0-9]*\)-/\1\//')".html
                ;;
              _posts_en/*.md)
                slug=$(basename "$f" .md)
                echo "https://$HOST/en/$(echo $slug | sed 's/^\([0-9]*-[0-9]*-[0-9]*\)-/\1\//')".html
                ;;
              *.html)
                echo "https://$HOST/$f"
                ;;
              projects/*.md)
                echo "https://$HOST/$f"
                ;;
            esac
          done)

          if [ -z "$URLS" ]; then
            echo "No content URLs changed, skipping IndexNow"
            exit 0
          fi

          URL_LIST=$(echo "$URLS" | jq -R -s 'split("\n") | map(select(length > 0))')
          echo "Submitting to IndexNow: $URL_LIST"

          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "{\"host\":\"$HOST\",\"key\":\"$KEY\",\"keyLocation\":\"https://$HOST/$KEY.txt\",\"urlList\":$URL_LIST}"
